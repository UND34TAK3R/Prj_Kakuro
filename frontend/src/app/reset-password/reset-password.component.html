<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<div class="page">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
    </div>

    <div class="game-container">

      <!-- Success state -->
      <div class="success-box" *ngIf="successMessage">
        <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        <p>{{ successMessage }}</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="requestReset()" novalidate *ngIf="!successMessage">

        <div class="field-group">
          <label class="field-label" for="email">Email address</label>
          <input
            class="field-input"
            type="email"
            id="email"
            formControlName="email"
            placeholder="you@example.com"
          />
          <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Enter a valid email address.
          </span>
        </div>

        <p class="field-error global-error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button class="auth-btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading" class="btn-loading">Sending…</span>
        </button>

      </form>

      <hr class="divider">

      <p class="auth-footer">
        Remembered your password?
        <a routerLink="/login">Sign in</a>
      </p>

    </div>
  </div>
</div>
