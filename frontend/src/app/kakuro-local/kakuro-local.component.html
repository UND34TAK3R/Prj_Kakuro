<div class="page">
  <header class="header">
    <h1>Kakuro – Local Game</h1>
    <p>Guest mode - Single player - Offline</p>
  </header>

  <div class="game-container">
    <div class="layout">
      <!-- side bar information for time, difficulty, and grid -->
      <aside class="sidebar">
        <div class="card">
          <h3>Game Info</h3>
          <p>⏱ Time: {{ time }}</p>
          <p>🎯 Difficulty: {{ selectedDifficulty }}</p>
          <p>📐 Grid: {{ selectedGridSize }}</p>
        </div>

        <div class="card">
          <h3>Settings</h3>

          <label>Difficulty</label>
          <select [(ngModel)]="selectedDifficulty">
            <option *ngFor="let d of difficulties" [value]="d">{{ d }}</option>
          </select>

          <label>Grid Size</label>
          <select [(ngModel)]="selectedGridSize"
                  (ngModelChange)="onGridSizeChange($event)">
            <option *ngFor="let g of gridSizes" [value]="g">{{ g }}</option>
          </select>

          <button>Start</button>
          <button class="warn">Reset</button>
          <button class="danger">Quit</button>
        </div>
      </aside>

      <!-- game on the right -->
      <main class="board">
        <div class="grid-container">
          <table class="kakuro-grid" *ngIf="isGridReady">
            <tr *ngFor="let row of grid">
              <td *ngFor="let cell of row"
                  [class.black-cell]="cell.isBlack"
                  class="cell">
                <input
                  *ngIf="!cell.isBlack"
                  type="text"
                  maxlength="1"
                  [(ngModel)]="cell.value"
                  class="cell-input">
              </td>
            </tr>
          </table>
        </div>
      </main>
    </div>
  </div>
</div>
