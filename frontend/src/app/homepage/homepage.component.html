<div class="hp-page">
  <div class="hp-card">

    <div class="hp-header">
      <h1 class="hp-title">Play Kakuro</h1>
      <p class="hp-subtitle">Configure your game and start playing</p>
    </div>

    <!-- Step 1: Select Game Mode -->
    <section class="config-section">
      <label class="config-label">Game Mode</label>
      <div class="option-group">
        <button
          *ngFor="let mode of gameModes"
          class="option-btn"
          [class.selected]="selectedGameMode === mode"
          (click)="selectGameMode(mode)">
          <span class="option-icon">{{ mode === 'Singleplayer' ? '👤' : '⚔️' }}</span>
          <span class="option-text">{{ mode }}</span>
          <span class="option-desc">{{ mode === 'Singleplayer' ? 'Play at your own pace' : 'Challenge another player' }}</span>
        </button>
      </div>
    </section>

    <hr class="divider" />

    <!-- Step 2: Select Grid Size -->
    <section class="config-section">
      <label class="config-label">Grid Size</label>
      <div class="grid-group">
        <button
          *ngFor="let size of gridSizes"
          class="grid-btn"
          [class.selected]="selectedGridSize === size"
          (click)="selectGridSize(size)">
          {{ size }}
        </button>
      </div>
    </section>

    <hr class="divider" />

    <ng-container *ngIf="selectedGameMode === 'Multiplayer'">
      <hr class = "divider"/>
      <section class = "config-section duel-section">
        <label class = "config-label">
          Invite a friend to Duel!
        </label>
        <div *ngIf="friends.length === 0" class = "empty-friends">
          No friends yet. Add friends in the Social Hub to invite them.
        </div>

        <ul class = "friends-duel-list" *ngIf="friends.length > 0">
          <li *ngFor="let friend of friends" class = "friend-duel-row" [class.selected-friend]="selectedFriend?.id === friend.id" (click)="selectFriendToDuel(friend)">
            <span class = "friend-avatar"> {{ friend.username.charAt(0).toUpperCase() }} </span>
            <span class = "friend-name"> {{ friend.username }} </span>
            <span class = "friend-check" *ngIf="selectedFriend?.id === friend.id"> ✓ </span>
          </li>
        </ul>

        <!-- Send Invite Button -->
        <div class="duel-actions" *ngIf="selectedFriend">
          <button
            class="duel-invite-btn"
            [disabled]="inviteStatus === 'sending' || inviteStatus === 'not-received' || inviteStatus === 'received' || inviteStatus === 'ready'"
            (click)="sendDuelInvite()">
            <span *ngIf="inviteStatus === 'idle' || inviteStatus === 'error' || inviteStatus === 'refused'">
              Send Duel Invite to {{ selectedFriend.username }}
            </span>
            <span *ngIf="inviteStatus === 'sending'">Sending…</span>
            <span *ngIf="inviteStatus === 'not-received' || inviteStatus === 'received'">Invite Sent</span>
            <span *ngIf="inviteStatus === 'ready'">Starting…</span>
          </button>

          <!-- Status indicator -->
          <div class="invite-status-row" *ngIf="inviteStatus !== 'idle'">
            <span
              class="invite-status-dot"
              [class.red]="inviteStatusColor === 'red'"
              [class.yellow]="inviteStatusColor === 'yellow'"
              [class.green]="inviteStatusColor === 'green'">
            </span>
            <span class="invite-status-label">{{ inviteStatusLabel }}</span>
          </div>
        </div>
      </section>
    </ng-container>

    <hr class="divider" />

    <!-- Summary & Play -->
    <div class="play-section">
      <p class="play-summary">
        <span class="summary-chip">{{ selectedGameMode }}</span>
        <span class="summary-sep">·</span>
        <span class="summary-chip">{{ selectedGridSize }}</span>
      </p>
      <button class="play-btn" (click)="playGame()">
        {{ selectedGameMode === 'Singleplayer' ? 'Start Game' : 'Find Match' }}
      </button>
    </div>

  </div>
</div>
